services:
  embyradar:
    image: lfy1680/embyradar:latest
    container_name: embyradar
    network_mode: host
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    volumes:
      # 挂载 config 目录，包含 config.json 和自动生成的 message_id.json
      - ./config:/app/config
      # 挂载 logs 目录，持久化日志文件
      - ./logs:/app/logs
